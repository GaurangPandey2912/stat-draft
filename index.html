<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stat Draft</title>
<link rel="manifest" href="manifest.json">
<script src="pokemon-data.js"></script>
<script src="species-data.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
h1 { text-align: center; font-size: 24px; color: #ffcb05; text-shadow: 2px 2px 0 #3b4cca; margin-bottom: 16px; }
.card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #0f3460; }
.card-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.mode-btn { background: #0f3460; color: #e0e0e0; border: 2px solid transparent; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 13px; transition: all .15s; }
.mode-btn:hover { border-color: #3b4cca; }
.mode-btn.active { border-color: #ffcb05; background: #1a3a6a; }
.mode-btn .count { color: #888; font-size: 11px; margin-top: 2px; }
.target-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.target-row input { flex: 1; min-width: 80px; padding: 10px; border-radius: 8px; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; font-size: 16px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-pri { background: #ffcb05; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-pri:disabled { opacity: .4; cursor: not-allowed; }
.btn-red { background: #e74c3c; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-red:disabled { opacity: .4; cursor: not-allowed; }
.btn-blue { background: #3498db; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-blue:disabled { opacity: .4; cursor: not-allowed; }
.btn-next { background: #3b4cca; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 10px; }
.btn-sm { background: #0f3460; color: #e0e0e0; border: 1px solid #3b4cca; padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
.btn-sm.active { border-color: #ffcb05; color: #ffcb05; }
.screen { display: none; }
.screen.active { display: block; }
.poke-name { text-align: center; font-size: 24px; font-weight: 700; color: #ffcb05; margin-bottom: 4px; }
.poke-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
.badge-regular { background: #3b4cca; color: #fff; }
.badge-mega { background: #e74c3c; color: #fff; }
.badge-legendary { background: #f39c12; color: #1a1a2e; }
.badge-mythical { background: #9b59b6; color: #fff; }
.stat-row { display: flex; align-items: center; padding: 8px; margin-bottom: 4px; border-radius: 8px; background: #0f3460; gap: 8px; font-size: 13px; }
.stat-row.clickable { cursor: pointer; transition: all .15s; }
.stat-row.clickable:hover { background: #1a3a6a; transform: translateX(3px); }
.stat-row.locked { opacity: .4; }
.stat-row.picked { background: #1a4a2e; border: 1px solid #78c850; }
.stat-row.missed { background: #4a1a1a; border: 1px solid #ff5959; }
.stat-row.best-highlight { border-left: 3px solid #ffcb05; }
.stat-lbl { width: 70px; font-weight: 600; font-size: 13px; }
.stat-val { width: 36px; text-align: right; font-weight: 700; font-size: 14px; }
.stat-bar { flex: 1; height: 10px; background: #0a1a30; border-radius: 5px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 5px; transition: width .4s; }
.stat-fill.hp { background: #ff5959; }
.stat-fill.attack { background: #f08030; }
.stat-fill.defense { background: #f5d743; }
.stat-fill.special-attack { background: #6890f0; }
.stat-fill.special-defense { background: #78c850; }
.stat-fill.speed { background: #f85888; }
.stat-marker { min-width: 50px; text-align: right; font-size: 11px; color: #888; }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; flex-wrap: wrap; gap: 6px; }
.header-bar .stat { background: #0f3460; padding: 5px 10px; border-radius: 6px; }
.header-bar .prog { color: #ffcb05; font-weight: 700; }
.speed-ctrl { display: flex; gap: 4px; align-items: center; margin-bottom: 10px; }
.speed-ctrl span { font-size: 11px; color: #888; }
.history { display: flex; flex-direction: column; gap: 4px; }
.history-item { display: flex; justify-content: space-between; padding: 6px 10px; background: #0f3460; border-radius: 6px; font-size: 12px; }
.bot-dec { background: #1a1a3e; border: 1px solid #e74c3c; border-radius: 8px; padding: 10px; margin-top: 8px; font-size: 13px; }
.bot-dec.perfect { border-color: #3498db; }
.conf-bar { height: 5px; background: #0a1a30; border-radius: 3px; overflow: hidden; margin: 5px 0; }
.conf-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #e74c3c, #f39c12, #78c850); transition: width .6s; }
.bot-feats { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
.bot-feat { background: #0f3460; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #888; }
.bot-feat strong { color: #e0e0e0; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
.summary-item { background: #0f3460; border-radius: 8px; padding: 10px; text-align: center; }
.summary-item .val { font-size: 22px; font-weight: 700; }
.summary-item .lbl { font-size: 10px; color: #888; margin-top: 2px; }
.opt-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
.opt-table th { text-align: left; padding: 6px 10px; color: #888; border-bottom: 1px solid #0f3460; font-size: 11px; }
.opt-table td { padding: 6px 10px; border-bottom: 1px solid #0a1a30; }
#err-msg { color: #ff5959; text-align: center; margin: 10px 0; display: none; font-size: 13px; }
@media (max-width: 500px) {
  .container { padding: 10px; }
  .card { padding: 12px; }
  .stat-row { padding: 6px; font-size: 12px; }
  .stat-lbl { width: 55px; font-size: 11px; }
  .stat-val { width: 30px; font-size: 12px; }
  .poke-name { font-size: 20px; }
  .btn-row button { font-size: 12px; padding: 8px 12px; }
}
</style>
</head>
<body>
<div class="container">
<h1>⚡ Stat Draft</h1>
<div id="err-msg"></div>

<div id="s-start" class="screen active">
  <div class="card">
    <div class="card-title">Mode</div>
    <div class="mode-grid" id="mode-grid"></div>
    <div class="card-title">Target</div>
    <div class="target-row">
      <input type="number" id="target-inp" value="400" min="1">
      <div class="btn-row">
        <button class="btn-pri" id="btn-play">Play</button>
        <button class="btn-red" id="btn-ai">🤖 AI Bot</button>
        <button class="btn-blue" id="btn-poke">🧠 PokeBot</button>
      </div>
    </div>
  </div>
</div>

<div id="s-game" class="screen">
  <div class="card">
    <div class="header-bar">
      <span class="stat" id="g-turn">Turn 1/6</span>
      <span class="stat" id="g-score">Score: 0</span>
      <span class="prog"><span id="g-prog">0</span> / <span id="g-target">400</span></span>
    </div>
    <div id="g-poke"></div>
  </div>
  <div class="card">
    <div class="card-title">Picks</div>
    <div id="g-hist" class="history"></div>
  </div>
</div>

<div id="s-res" class="screen">
  <div class="card">
    <div class="result-grid" id="res-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
  </div>
  <div class="card">
    <div class="card-title">Optimal Assignment</div>
    <div id="res-opt"></div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn-pri" onclick="backStart()">Menu</button>
    <button class="btn-pri" onclick="playAgain()" style="margin-left:8px">Play Again</button>
  </div>
</div>

<div id="s-bot" class="screen">
  <div class="card">
    <div class="header-bar">
      <span class="stat" id="b-turn">Turn 1/6</span>
      <span class="stat" id="b-score">Score: 0</span>
      <span class="prog"><span id="b-prog">0</span> / <span id="b-target">400</span></span>
    </div>
    <div class="speed-ctrl">
      <span>Speed:</span>
      <button class="btn-sm" data-sp="2500" onclick="setSp(2500)">Slow</button>
      <button class="btn-sm active" data-sp="1200" onclick="setSp(1200)">Norm</button>
      <button class="btn-sm" data-sp="400" onclick="setSp(400)">Fast</button>
      <button class="btn-sm" data-sp="0" onclick="setSp(0)">Inst</button>
    </div>
    <div id="b-poke"></div>
  </div>
  <div class="card">
    <div class="card-title">Bot's Picks</div>
    <div id="b-hist" class="history"></div>
  </div>
</div>

<div id="s-bres" class="screen">
  <div class="card">
    <div class="card-title" id="bres-title">🤖 Results</div>
    <div class="summary-grid" id="bres-summary"></div>
  </div>
  <div class="card">
    <div class="card-title">Decisions</div>
    <div id="bres-review"></div>
  </div>
  <div class="card">
    <div class="card-title">Optimal</div>
    <div id="bres-opt"></div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn-pri" onclick="backStart()">Menu</button>
    <button class="btn-red" id="bres-again" onclick="runBot(botMode)" style="margin-left:8px">Play Again</button>
  </div>
</div>
</div>

<script>
const ORDER = ["hp","attack","defense","special-attack","special-defense","speed"];
const LBL = {"hp":"HP","attack":"Attack","defense":"Defense","special-attack":"Sp.Atk","special-defense":"Sp.Def","speed":"Speed"};
const COL = {"hp":"#ff5959","attack":"#f08030","defense":"#f5d743","special-attack":"#6890f0","special-defense":"#78c850","speed":"#f85888"};
const MODE_LBL = {"regular":"Regular","mega":"Mega","legendary":"Legendary","mythical":"Mythical"};
const MODE_CLS = {"regular":"badge-regular","mega":"badge-mega","legendary":"badge-legendary","mythical":"badge-mythical"};

let selMode = "regular";
let curTarget = 400;
let gameState = null;
let revData = null;

// Bot state
let botSpeed = 1200;
let botMode = "ai";
let botData = null;
let botTurn = 0;

function ft(n){return n.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase())}

function filterPool(mode){
  let p = POKEMON_DATA;
  if(mode==="mega") return p.filter(x=>x.mega);
  if(mode==="legendary") return p.filter(x=>x.legendary);
  if(mode==="mythical") return p.filter(x=>x.mythical);
  return p;
}

function bestPossible(list){
  let best=0,bestA=null;
  function permute(arr,pre){
    if(pre.length===6){
      let t=0,a=[];
      for(let i=0;i<6;i++){let s=ORDER[i],p=pre[i];t+=p.stats[s]||0;a.push([s,p.name,p.stats[s]||0])}
      if(t>best){best=t;bestA=a}
      return;
    }
    for(let i=0;i<arr.length;i++){
      let r=[...arr];r.splice(i,1);permute(r,[...pre,arr[i]]);
    }
  }
  permute(list,[]);
  return [best,bestA];
}

function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

// ── Language model (simple stopwords) ──
const SW=new Set("the a an it its is are was were be been to of in for on with at by from as into through and or but not no this that these those their has have had can will may all each every both which who what when where how does do s t m ll re ve d o".split(" "));
function tok(t){return(t.toLowerCase().match(/[a-z]+/g)||[]).filter(w=>!SW.has(w)&&w.length>2)}

// ── Feature extraction ──
function features(pk){
  let f=new Set();
  tok(pk.name).forEach(w=>f.add("name:"+w));
  let s=SPECIES_DATA[pk.name];
  if(!s) return [...f];
  (s.flavor_texts||[]).forEach(t=>tok(t).forEach(w=>f.add("flavor:"+w)));
  (s.types||[]).forEach(t=>f.add("type:"+t));
  if(s.genus) tok(s.genus).forEach(w=>f.add("genus:"+w));
  if(s.color) f.add("color:"+s.color);
  if(s.shape) f.add("shape:"+s.shape);
  if(s.habitat) f.add("habitat:"+s.habitat);
  (s.egg_groups||[]).forEach(g=>f.add("egg:"+g));
  if(s.growth_rate) f.add("growth:"+s.growth_rate);
  if(s.generation) f.add("gen:"+s.generation);
  let cr=s.capture_rate||0;
  if(cr<=3) f.add("rarity:legendary_tier");
  else if(cr<=25) f.add("rarity:rare");
  else if(cr<=100) f.add("rarity:uncommon");
  else f.add("rarity:common");
  if(s.is_baby) f.add("stage:baby");
  let h=s.height||0;
  if(h<5) f.add("height:tiny");else if(h<10) f.add("height:small");else if(h<20) f.add("height:medium");else if(h<50) f.add("height:large");else f.add("height:huge");
  let w=s.weight||0;
  if(w<50) f.add("weight:light");else if(w<200) f.add("weight:medium");else if(w<500) f.add("weight:heavy");else f.add("weight:massive");
  if(pk.legendary) f.add("flag:legendary");
  if(pk.mythical) f.add("flag:mythical");
  if(pk.mega) f.add("flag:mega");
  return [...f];
}

// ── Learning Bot ──
class LearnBot{
  constructor(lr=0.3){this.lr=lr;this.w={};this.b=[0,0,0,0,0,0];this.picks=0}
  pred(f){
    let s=[...this.b],c=0;
    for(let x of f){
      let w=this.w[x]||[0,0,0,0,0,0];
      for(let i=0;i<6;i++)s[i]+=w[i];c++;
    }
    if(c>0)s=s.map(x=>x/c);
    let bi=s.indexOf(Math.max(...s));
    return [ORDER[bi],s[bi]];
  }
  upd(f,st){
    let bi=ORDER.indexOf(ORDER.reduce((a,b)=>st[a]>=st[b]?a:b));
    let pi=ORDER.indexOf(this.pred(f)[0]);
    for(let x of f){
      let w=this.w[x]||[0,0,0,0,0,0];
      for(let i=0;i<6;i++)w[i]+=this.lr*((i===bi?1:0)-(i===pi?1:0));
      this.w[x]=w;
    }
    this.b[bi]+=this.lr*0.1;this.b[pi]-=this.lr*0.1;this.picks++;
  }
}

let theBot=null;

function pretrainBot(){
  theBot=new LearnBot(0.3);
  let pool=filterPool("regular");
  for(let g=0;g<200;g++){
    let avail=[...Array(pool.length).keys()];shuf(avail);let ch=avail.slice(0,6);
    let locked=new Set();
    for(let i of ch){
      let pk=pool[i],fe=features(pk);
      if(!fe.length)fe=tok(pk.name).map(w=>"name:"+w);
      let st=theBot.pred(fe)[0],a=0;
      while(locked.has(st)&&a++<20){
        let sc=[];for(let s of ORDER)if(!locked.has(s))sc.push([theBot.pred([...fe,"STAT_HINT_"+s])[1],s]);
        sc.sort((a,b)=>b[0]-a[0]);st=sc.length?sc[0][1]:[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];
      }
      if(locked.has(st))st=[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];
      locked.add(st);theBot.upd(fe,pk.stats);
    }
  }
}

function botPick(pk,locked,mode){
  if(mode==="perfect"){
    let av=ORDER.filter(s=>!locked.has(s));
    if(!av.length)return [null,0];
    let best=av[0];for(let s of av)if((pk.stats[s]||0)>(pk.stats[best]||0))best=s;
    return [best,1];
  }
  let fe=features(pk);
  if(!fe.length)fe=tok(pk.name).map(w=>"name:"+w);
  let [st,conf]=theBot.pred(fe);let a=0;
  while(locked.has(st)&&a++<20){
    let sc=[];for(let s of ORDER)if(!locked.has(s))sc.push([theBot.pred([...fe,"STAT_HINT_"+s])[1],s]);
    sc.sort((a,b)=>b[0]-a[0]);st=sc.length?sc[0][1]:[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];conf=sc.length?sc[0][0]:0;
  }
  if(locked.has(st)){st=[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];conf=0}
  return [st,conf];
}

// ── Game ──
function newGame(mode,target){
  let pool=filterPool(mode);
  if(pool.length<6)return null;
  let idx=[...Array(pool.length).keys()];shuf(idx);idx=idx.slice(0,6);
  return {mode,target,pool,turn:0,picks:[],locked:new Set(),state:"play",used:idx,cur:idx[0],shown:[]};
}

function getCurPoke(g){
  if(g.state!=="play")return null;
  if(g.cur===null&&g.turn<6){
    g.cur=g.used[g.turn];
  }
  if(g.turn>=6){g.state="done";return null}
  return g.pool[g.cur];
}

function doPick(g,stat){
  if(g.state!=="play")return null;
  if(g.locked.has(stat))return null;
  let pk=g.pool[g.cur];
  let val=pk.stats[stat]||0;
  g.picks.push({name:pk.name,stat,val});
  g.locked.add(stat);
  g.shown.push(pk);
  g.cur=null;
  g.turn++;
  if(g.turn>=6)g.state="done";
  let total=g.picks.reduce((s,p)=>s+p.val,0);
  return {turn:g.turn,total,state:g.state,revealed:{name:pk.name,stats:pk.stats,chosen:stat,value:val},locked:[...g.locked]};
}

function renderModeBtns(){
  let g=document.getElementById("mode-grid");
  g.innerHTML="";
  for(let [m,t] of Object.entries({"regular":filterPool("regular").length,"mega":filterPool("mega").length,"legendary":filterPool("legendary").length,"mythical":filterPool("mythical").length})){
    let b=document.createElement("div");
    b.className="mode-btn"+(m===selMode?" active":"");
    b.innerHTML="<strong>"+MODE_LBL[m]+"</strong><div class='count'>"+t+" Pokemon</div>";
    b.onclick=()=>{document.querySelectorAll(".mode-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");selMode=m;};
    g.appendChild(b);
  }
}

function showErr(m){let e=document.getElementById("err-msg");e.textContent=m;e.style.display="block";setTimeout(()=>e.style.display="none",3000)}

// ── Human game ──
document.getElementById("btn-play").onclick=async()=>{
  let t=parseInt(document.getElementById("target-inp").value)||400;curTarget=t;
  document.getElementById("btn-play").disabled=true;
  let g=newGame(selMode,t);
  if(!g){showErr("Not enough Pokemon");document.getElementById("btn-play").disabled=false;return}
  gameState=g;revData=null;
  showScreen("s-game");renderGame();
};

function renderGame(){
  let g=gameState;
  if(!g)return;
  document.getElementById("g-turn").textContent="Turn "+(Math.min(g.turn+1,6))+"/6";
  let tot=g.picks.reduce((s,p)=>s+p.val,0);
  document.getElementById("g-score").textContent="Score: "+tot;
  document.getElementById("g-prog").textContent=tot;
  document.getElementById("g-target").textContent=g.target;
  if(g.state==="done"){showRes(g);return}
  getCurPoke(g);
  renderPoke(g);
  renderHist(g);
}

function renderPoke(g){
  let el=document.getElementById("g-poke"),pk=g.cur!==null?g.pool[g.cur]:null;
  if(!pk&&revData)pk=g.shown[g.shown.length-1];
  if(!pk){el.innerHTML="";return}
  let cls=MODE_CLS[selMode]||"badge-regular",lb=MODE_LBL[selMode]||"Regular";
  let h='<div style="text-align:center;margin-bottom:10px"><div class="poke-name">'+pk.name+'</div><span class="poke-badge '+cls+'">'+lb+'</span></div>';
  for(let s of ORDER){
    let lk=g.locked.has(s),rv=revData&&revData.name===pk.name,pi=rv&&revData.chosen===s;
    let cl="stat-row"+(lk?" locked":" clickable")+(rv?"":"")+(pi?" picked":"");
    let v=rv?revData.stats[s]:"???",ba=rv?'<div class="stat-bar"><div class="stat-fill '+s+'" style="width:'+Math.min(100,revData.stats[s]/2.55)+'%"></div></div>':lk?'<div class="stat-bar"></div>':'<div class="stat-bar" style="background:#0a1a30"><div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#555">???</div></div>';
    let mk=lk?"🔒":rv?"":"Pick →";
    let oc=lk||rv?"":'onclick="pickStat(\''+s+'\')"';
    h+='<div '+oc+' class="'+cl+'"><span class="stat-lbl">'+LBL[s]+'</span><span class="stat-val">'+v+'</span>'+ba+'<span class="stat-marker">'+mk+'</span></div>';
  }
  if(revData&&revData.name===pk.name)h+='<div style="text-align:center"><button class="btn-next" onclick="nextTurn()">Next →</button></div>';
  el.innerHTML=h;
}

function renderHist(g){
  let el=document.getElementById("g-hist");
  if(!g.picks.length){el.innerHTML='<div style="color:#555;font-size:12px">No picks</div>';return}
  el.innerHTML=g.picks.map(p=>'<div class="history-item"><span>'+p.name+' — '+LBL[p.stat]+'</span><strong>'+p.val+'</strong></div>').join("");
}

function pickStat(s){
  let r=doPick(gameState,s);if(!r)return;
  revData=r.revealed;
  let g=gameState;
  document.getElementById("g-score").textContent="Score: "+r.total;
  document.getElementById("g-prog").textContent=r.total;
  renderPoke(g);renderHist(g);
  if(g.state==="done")setTimeout(()=>showRes(g),500);
  else document.getElementById("btn-play").disabled=false;
}

function nextTurn(){revData=null;renderGame()}

function showRes(g){
  showScreen("s-res");
  let tot=g.picks.reduce((s,p)=>s+p.val,0),pas=tot>=g.target;
  let [best,ba]=bestPossible(g.shown);
  document.getElementById("res-grid").innerHTML='<div class="summary-item"><div class="lbl">Score</div><div class="val" style="color:'+(pas?'#78c850':'#ff5959')+'">'+tot+'</div></div><div class="summary-item"><div class="lbl">Target</div><div class="val" style="color:#ffcb05">'+g.target+'</div></div><div class="summary-item"><div class="lbl">Best</div><div class="val" style="color:#6890f0">'+best+'</div></div><div class="summary-item"><div class="lbl">Result</div><div class="val" style="color:'+(pas?'#78c850':'#ff5959')+'">'+(pas?'PASS':'FAIL')+'</div></div>';
  let o=document.getElementById("res-opt");
  if(ba)o.innerHTML='<table class="opt-table"><tr><th>Stat</th><th>Pokemon</th><th>Val</th></tr>'+ba.map(x=>'<tr><td>'+LBL[x[0]]+'</td><td>'+x[1]+'</td><td><strong>'+x[2]+'</strong></td></tr>').join("")+'</table>';
  else o.innerHTML='<div style="color:#888;font-size:12px">No data</div>';
}

function playAgain(){
  document.getElementById("btn-play").disabled=false;
  document.getElementById("btn-play").click();
}

// ── Bot ──
document.getElementById("btn-ai").onclick=()=>runBot("ai");
document.getElementById("btn-poke").onclick=()=>runBot("perfect");

function runBot(mode){
  botMode=mode;
  let t=parseInt(document.getElementById("target-inp").value)||400;curTarget=t;
  let pool=filterPool(selMode);
  if(pool.length<6){showErr("Not enough Pokemon");return}
  let avail=[...Array(pool.length).keys()];shuf(avail);avail=avail.slice(0,6);
  let turns=[],locked=new Set(),total=0;
  for(let i of avail){
    let pk=pool[i];
    let [st,conf]=botPick(pk,locked,mode);
    let val=pk.stats[st]||0,ab=ORDER.reduce((a,b)=>pk.stats[a]>=pk.stats[b]?a:b);
    total+=val;locked.add(st);
    let feats=[];
    if(mode==="ai"&&theBot){
      let fe=features(pk);if(!fe.length)fe=tok(pk.name).map(w=>"name:"+w);
      let fs=fe.filter(x=>theBot.w[x]).map(x=>[x,theBot.w[x][ORDER.indexOf(st)]]).sort((a,b)=>b[1]-a[1]).slice(0,5);
      feats=fs.map(x=>({feature:x[0],weight:x[1].toFixed(2)}));
      theBot.upd(fe,pk.stats);
    }else if(mode==="perfect"){
      let sorted=ORDER.map(s=>({s, v:pk.stats[s]||0})).sort((a,b)=>b.v-a.v).slice(0,3);
      feats=sorted.map(x=>({feature:LBL[x.s]+"="+x.v,weight:x.v}));
    }
    turns.push({pokemon:{name:pk.name,stats:Object.fromEntries(ORDER.map(s=>[LBL[s],pk.stats[s]||0]))},decision:{picked:LBL[st],actualBest:LBL[ab],value:val,bestVal:pk.stats[ab],confidence:conf},features:feats,locked:[...locked]});
  }
  let [best,ba]=bestPossible(avail.map(i=>pool[i]));
  let eff=best>0?Math.round(total/best*1000)/10:0;
  botData={mode:selMode,target:t,total,bestPossible:best,efficiency:eff,passed:total>=t,turns,optimal:ba?ba.map(x=>({stat:LBL[x[0]],name:x[1],val:x[2]})):[]};
  showScreen("s-bot");botTurn=0;
  document.getElementById("b-target").textContent=t;
  renderBotTurn();
}

function setSp(ms){botSpeed=ms;document.querySelectorAll(".btn-sm").forEach(b=>b.classList.remove("active"));document.querySelector('[data-sp="'+ms+'"]').classList.add("active")}

function renderBotTurn(){
  let tr=botData.turns[botTurn],t=botTurn,isAI=botMode==="ai";
  let tot=botData.turns.slice(0,t+1).reduce((s,x)=>s+x.decision.value,0);
  document.getElementById("b-turn").textContent="Turn "+(t+1)+"/6";
  document.getElementById("b-score").textContent="Score: "+tot;
  document.getElementById("b-prog").textContent=tot;
  let pk=tr.pokemon,bd=tr.decision;
  let h='<div style="text-align:center;margin-bottom:10px"><div class="poke-name">'+pk.name+' <span class="poke-badge" style="background:'+(isAI?"#e74c3c":"#3498db")+';color:#fff;font-size:9px">'+(isAI?"AI":"Poke")+'</span></div></div>';
  for(let sk of ORDER){
    let sl=LBL[sk],val=pk.stats[sl]||0,pi=sl===bd.picked,bi=sl===bd.actualBest;
    let cl="stat-row";
    if(pi)cl+=bi?" picked":" missed";
    else if(bi)cl+=" best-highlight";
    let pct=Math.min(100,val/2.55);
    let ba='<div class="stat-bar"><div class="stat-fill '+sk+'" style="width:'+pct+'%"></div></div>';
    let mk="";
    if(pi)mk=bi?"✓ Pick":"✗ Pick";
    else if(bi)mk="★ Best";
    h+='<div class="'+cl+'"><span class="stat-lbl">'+sl+'</span><span class="stat-val">'+val+'</span>'+ba+'<span class="stat-marker">'+mk+'</span></div>';
  }
  let cor=bd.picked===bd.actualBest;
  h+='<div class="bot-dec'+(isAI?"":" perfect")+'" style="border-color:'+(isAI?"#e74c3c":"#3498db")+'">';
  if(isAI){
    let cnf=Math.min(100,Math.max(0,(bd.confidence+2)/4*100));
    h+='<div>Picked <strong>'+bd.picked+'</strong> ('+bd.value+') conf:'+bd.confidence.toFixed(2)+' — best: <strong>'+bd.actualBest+'</strong> ('+bd.bestVal+') <span style="color:'+(cor?"#78c850":"#ff5959")+'">'+(cor?"✓":"✗")+'</span></div>';
    h+='<div class="conf-bar"><div class="conf-fill" style="width:'+cnf+'%"></div></div>';
  }else{
    h+='<div>Picked <strong>'+bd.picked+'</strong> = '+bd.value+' — best: <strong>'+bd.actualBest+'</strong> = '+bd.bestVal+' <span style="color:'+(cor?"#78c850":"#ff5959")+'">'+(cor?"✓":"✗")+'</span></div>';
    h+='<div style="color:#888;font-size:11px;margin-top:3px">Knows stats — greedy pick</div>';
  }
  if(tr.features.length){
    h+='<div class="bot-feats">';
    for(let f of tr.features)h+='<span class="bot-feat"><strong>'+f.feature+'</strong>'+(isAI?" ("+f.weight+")":"")+'</span>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById("b-poke").innerHTML=h;
  // History
  let hh="";
  for(let i=0;i<=t;i++){let d=botData.turns[i].decision;hh+='<div class="history-item"><span>'+(i+1)+'. '+botData.turns[i].pokemon.name+' — '+d.picked+'</span><strong>'+d.value+' '+(d.picked===d.actualBest?"✓":"✗")+'</strong></div>'}
  document.getElementById("b-hist").innerHTML=hh;
  if(t+1<6){if(botSpeed>0)setTimeout(()=>{botTurn++;renderBotTurn()},botSpeed);else{botTurn++;renderBotTurn()}}
  else setTimeout(showBotRes,botSpeed);
}

function showBotRes(){
  let g=botData,isAI=botMode==="ai";
  let theme=isAI?{name:"AI Bot",color:"#e74c3c",icon:"🤖"}:{name:"PokeBot",color:"#3498db",icon:"🧠"};
  showScreen("s-bres");
  document.getElementById("bres-title").textContent=theme.icon+" "+theme.name+(g.passed?" PASSED":" FAILED");
  document.getElementById("bres-again").textContent=theme.icon+" Play Again";
  document.getElementById("bres-again").style.background=theme.color;
  document.getElementById("bres-summary").innerHTML='<div class="summary-item"><div class="lbl">Score</div><div class="val" style="color:'+(g.passed?"#78c850":"#ff5959")+'">'+g.total+'</div></div><div class="summary-item"><div class="lbl">Target</div><div class="val" style="color:#ffcb05">'+g.target+'</div></div><div class="summary-item"><div class="lbl">Efficiency</div><div class="val" style="color:#6890f0">'+g.efficiency+'%</div></div>';
  let h="";
  for(let i=0;i<g.turns.length;i++){let d=g.turns[i].decision,c=d.picked===d.actualBest;h+='<div class="history-item" style="margin-bottom:3px"><span>'+(i+1)+'. '+g.turns[i].pokemon.name+'</span><span>'+d.picked+' ('+d.value+') <span style="color:'+(c?"#78c850":"#ff5959")+'">'+(c?"✓":"✗ best: "+d.actualBest+"="+d.bestVal)+'</span></span></div>'}
  document.getElementById("bres-review").innerHTML=h;
  let o=document.getElementById("bres-opt");
  if(g.optimal.length)o.innerHTML='<table class="opt-table"><tr><th>Stat</th><th>Pokemon</th><th>Val</th></tr>'+g.optimal.map(x=>'<tr><td>'+x.stat+'</td><td>'+x.name+'</td><td><strong>'+x.val+'</strong></td></tr>').join("")+'</table>';
  else o.innerHTML='<div style="color:#888;font-size:12px">No data</div>';
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function backStart(){
  document.getElementById("btn-play").disabled=false;
  showScreen("s-start");
}

renderModeBtns();
pretrainBot();
console.log("Bot pre-trained, vocab:", Object.keys(theBot.w).length);
