<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stat Draft</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<script src="pokemon-data.js"></script>
<script src="species-data.js"></script>
<script src="sprite-map.js"></script>
<style>
@keyframes reveal {
  0% { opacity: 0; transform: translateY(-8px) scaleY(0.8); }
  100% { opacity: 1; transform: translateY(0) scaleY(1); }
}
@keyframes statPop {
  0% { opacity: 0; transform: translateX(-15px) scale(0.9); }
  60% { transform: translateX(2px) scale(1.02); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes fadeSlide {
  0% { opacity: 0; transform: translateX(-10px); }
  100% { opacity: 1; transform: translateX(0); }
}
@keyframes popIn {
  0% { opacity: 0; transform: scale(0.8); }
  60% { transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes glow {
  0%, 100% { box-shadow: 0 0 4px rgba(255,203,5,0.3); }
  50% { box-shadow: 0 0 12px rgba(255,203,5,0.6); }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'VT323', monospace;
  background: #0f0f23;
  color: #e8e8e8;
  min-height: 100vh;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  background-image:
    radial-gradient(ellipse at 20% 50%, #1a1a3e 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, #1a1a3e 0%, transparent 50%);
}
.container { max-width: 860px; margin: 0 auto; padding: 12px; }
h1 {
  font-family: 'Press Start 2P', monospace;
  text-align: center;
  font-size: 18px;
  color: #ffcb05;
  text-shadow: 2px 2px 0 #3b4cca, -1px -1px 0 #3b4cca;
  margin-bottom: 14px;
  letter-spacing: 1px;
  word-break: break-word;
}

.card {
  background: linear-gradient(135deg, #1e2a4a 0%, #162040 100%);
  border: 2px solid #3b4cca;
  border-radius: 0;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
  box-shadow:
    inset 0 0 0 2px #0f0f23,
    0 2px 8px rgba(0,0,0,0.4);
}
.card-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #8899bb;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.mode-btn {
  background: #121c34;
  color: #c8d0e0;
  border: 2px solid #2a3a6a;
  padding: 10px;
  cursor: pointer;
  text-align: left;
  font-family: 'VT323', monospace;
  font-size: 14px;
  transition: all .15s;
}
.mode-btn:hover { border-color: #5a7acc; background: #1a2a4a; }
.mode-btn.active { border-color: #ffcb05; background: #1a2a4a; box-shadow: inset 0 0 0 1px #ffcb05; }
.mode-btn .count { color: #7788aa; font-size: 12px; margin-top: 2px; }

.target-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.target-row input {
  flex: 1; min-width: 80px; padding: 8px;
  border: 2px solid #2a3a6a;
  background: #0a1428;
  color: #ffcb05;
  font-family: 'VT323', monospace;
  font-size: 20px;
  outline: none;
}
.target-row input:focus { border-color: #ffcb05; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

.btn {
  border: none;
  padding: 8px 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  cursor: pointer;
  transition: all .1s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.btn-pri { background: #ffcb05; color: #0f0f23; }
.btn-red { background: #cc3333; color: #fff; }
.btn-blue { background: #3366cc; color: #fff; }
.btn-next {
  background: #3b4cca;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 8px 20px;
  margin-top: 10px;
  border: none;
  cursor: pointer;
  letter-spacing: 0.5px;
}
.btn-next:active { transform: scale(0.95); }
.btn-sm {
  background: #121c34;
  color: #8899bb;
  border: 1px solid #2a3a6a;
  padding: 4px 10px;
  font-family: 'VT323', monospace;
  font-size: 13px;
  cursor: pointer;
}
.btn-sm.active { border-color: #ffcb05; color: #ffcb05; background: #1a2a4a; }

.screen { display: none; }
.screen.active { display: block; animation: fadeSlide .25s ease-out; }

/* Pokemon card display */
.poke-header { text-align: center; margin-bottom: 10px; position: relative; }
.poke-sprite {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  width: 80px;
  height: 80px;
  object-fit: contain;
  margin-bottom: 4px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
.poke-sprite.shiny {
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.7)) drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  animation: shinyGlow 2s ease-in-out infinite;
}
@keyframes shinyGlow {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(255,215,0,0.5)) drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  50% { filter: drop-shadow(0 0 14px rgba(255,215,0,0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
}
.poke-sprite.loading { opacity: 0.5; }
.poke-sprite-wrap {
  display: inline-block;
  background: radial-gradient(circle, #1a2a4a 0%, #0f1a30 100%);
  border: 2px solid #2a3a6a;
  padding: 6px;
  margin-bottom: 6px;
  position: relative;
}
.poke-sprite-wrap.shiny {
  border-color: #ffd700;
  box-shadow: 0 0 10px rgba(255,215,0,0.4), inset 0 0 10px rgba(255,215,0,0.1);
  animation: shinyBorder 2s ease-in-out infinite;
}
@keyframes shinyBorder {
  0%, 100% { border-color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.3); }
  50% { border-color: #ffec80; box-shadow: 0 0 16px rgba(255,215,0,0.6); }
}
.shiny-star {
  position: absolute;
  top: -4px;
  right: -4px;
  font-size: 16px;
  filter: drop-shadow(0 0 3px rgba(255,215,0,0.8));
  animation: shinySpin 3s linear infinite;
  pointer-events: none;
}
@keyframes shinySpin {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); }
}
.poke-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: #ffcb05;
  text-shadow: 1px 1px 0 #3b4cca;
  margin-bottom: 3px;
}
.poke-badge {
  display: inline-block;
  padding: 2px 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  letter-spacing: 0.5px;
}
.badge-regular { background: #3b4cca; color: #fff; }
.badge-mega { background: #cc3333; color: #fff; }
.badge-legendary { background: #ff8c00; color: #0f0f23; }
.badge-mythical { background: #8844aa; color: #fff; }
.type-badge {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 2px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #fff;
  letter-spacing: 0.5px;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}

.stat-row {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  margin-bottom: 3px;
  background: #0a1428;
  gap: 6px;
  font-size: 16px;
  border-left: 3px solid transparent;
  transition: all .2s;
}
.stat-row.clickable { cursor: pointer; }
.stat-row.clickable:hover {
  background: #1a2a4a;
  border-left-color: #ffcb05;
  transform: translateX(2px);
}
.stat-row.locked { opacity: .35; }
.stat-row.reveal {
  animation: statPop .4s ease-out both;
}
.stat-row.picked {
  background: #0a2a18;
  border-left-color: #78c850;
}

.stat-row.missed {
  background: #2a0a0a;
  border-left-color: #ff4444;
  animation: reveal .35s ease-out;
}
.stat-row.best-highlight { border-left-color: #ffcb05; }
.stat-lbl {
  width: 70px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: #8899bb;
}
.stat-val {
  width: 36px;
  text-align: right;
  font-weight: 700;
  font-size: 18px;
  color: #e8e8e8;
}
.stat-bar { flex: 1; height: 8px; background: #060e1c; overflow: hidden; }
.stat-fill { height: 100%; transition: width .5s ease-out; }
.stat-fill.hp { background: #ff5959; }
.stat-fill.attack { background: #f08030; }
.stat-fill.defense { background: #f5d743; }
.stat-fill.special-attack { background: #6890f0; }
.stat-fill.special-defense { background: #78c850; }
.stat-fill.speed { background: #f85888; }
.stat-marker {
  min-width: 50px;
  text-align: right;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #667788;
}

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-size: 16px;
  flex-wrap: wrap;
  gap: 4px;
}
.header-bar .stat {
  background: #0a1428;
  padding: 4px 8px;
  border: 1px solid #2a3a6a;
}
.header-bar .prog { color: #ffcb05; font-weight: 700; font-size: 20px; }

.speed-ctrl { display: flex; gap: 4px; align-items: center; margin-bottom: 8px; }
.speed-ctrl span { font-size: 14px; color: #667788; margin-right: 4px; }

.history { display: flex; flex-direction: column; gap: 3px; }
.history-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  background: #0a1428;
  font-size: 15px;
  animation: fadeSlide .2s ease-out;
}
.history-item .hist-sprite {
  image-rendering: pixelated;
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.bot-dec {
  background: #0a0a1e;
  border: 1px solid #cc3333;
  padding: 8px;
  margin-top: 6px;
  font-size: 15px;
}
.bot-dec.perfect { border-color: #3366cc; }
.conf-bar { height: 4px; background: #060e1c; margin: 4px 0; }
.conf-fill { height: 100%; background: linear-gradient(90deg, #cc3333, #ff8c00, #78c850); transition: width .6s; }
.bot-feats { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
.bot-feat {
  background: #121c34;
  padding: 1px 6px;
  font-size: 13px;
  color: #7788aa;
}
.bot-feat strong { color: #c8d0e0; }

.summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
.summary-item {
  background: #0a1428;
  border: 1px solid #2a3a6a;
  padding: 8px;
  text-align: center;
}
.summary-item .val { font-size: 24px; font-weight: 700; }
.summary-item .lbl { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #667788; margin-top: 2px; }

.opt-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 15px; }
.opt-table th { text-align: left; padding: 4px 8px; color: #667788; border-bottom: 1px solid #2a3a6a; font-family: 'Press Start 2P', monospace; font-size: 7px; }
.opt-table td { padding: 4px 8px; border-bottom: 1px solid #0a1428; }

#err-msg {
  color: #ff4444;
  text-align: center;
  margin: 8px 0;
  display: none;
  font-size: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
}

@media (max-width: 500px) {
  .container { padding: 8px; }
  .card { padding: 10px; }
  h1 { font-size: 14px; }
  .poke-name { font-size: 11px; }
  .poke-sprite { width: 64px; height: 64px; }
  .stat-row { padding: 5px 8px; font-size: 14px; }
  .stat-lbl { width: 55px; font-size: 7px; }
  .stat-val { width: 30px; font-size: 16px; }
  .stat-marker { min-width: 40px; font-size: 6px; }
  .btn { font-size: 8px; padding: 6px 12px; }
  .summary-item .val { font-size: 20px; }
  .header-bar { font-size: 14px; }
}
</style>
</head>
<body>
<div class="container">
<h1>Stat Draft</h1>
<div id="err-msg"></div>

<div id="s-start" class="screen active">
  <div class="card">
    <div class="card-title">Mode</div>
    <div class="mode-grid" id="mode-grid"></div>
    <div class="card-title">Target</div>
    <div class="target-row">
      <input type="number" id="target-inp" value="400" min="1">
      <div class="btn-row">
        <button class="btn btn-pri" id="btn-play">Play</button>
        <button class="btn btn-red" id="btn-ai">AI Bot</button>
        <button class="btn btn-blue" id="btn-poke">PokeBot</button>
      </div>
    </div>
  </div>
</div>

<div id="s-game" class="screen">
  <div class="card">
    <div class="header-bar">
      <span class="stat" id="g-turn">Turn 1/6</span>
      <span class="stat" id="g-score">Score: 0</span>
      <span class="prog"><span id="g-prog">0</span> / <span id="g-target">400</span></span>
    </div>
    <div id="g-poke"></div>
  </div>
  <div class="card">
    <div class="card-title">Picks</div>
    <div id="g-hist" class="history"></div>
  </div>
</div>

<div id="s-res" class="screen">
  <div class="card">
    <div class="result-grid" id="res-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:6px"></div>
  </div>
  <div class="card">
    <div class="card-title">Your Team</div>
    <div id="res-team" class="history"></div>
  </div>
  <div class="card">
    <div class="card-title">Optimal Assignment</div>
    <div id="res-opt"></div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn btn-pri" onclick="backStart()">Menu</button>
    <button class="btn btn-pri" onclick="playAgain()" style="margin-left:6px">Play Again</button>
  </div>
</div>

<div id="s-bot" class="screen">
  <div class="card">
    <div class="header-bar">
      <span class="stat" id="b-turn">Turn 1/6</span>
      <span class="stat" id="b-score">Score: 0</span>
      <span class="prog"><span id="b-prog">0</span> / <span id="b-target">400</span></span>
    </div>
    <div class="speed-ctrl">
      <span>Speed:</span>
      <button class="btn-sm" data-sp="2500" onclick="setSp(2500)">Slow</button>
      <button class="btn-sm active" data-sp="1200" onclick="setSp(1200)">Norm</button>
      <button class="btn-sm" data-sp="400" onclick="setSp(400)">Fast</button>
      <button class="btn-sm" data-sp="0" onclick="setSp(0)">Inst</button>
    </div>
    <div id="b-poke"></div>
  </div>
  <div class="card">
    <div class="card-title">Bot's Picks</div>
    <div id="b-hist" class="history"></div>
  </div>
</div>

<div id="s-bres" class="screen">
  <div class="card">
    <div class="card-title" id="bres-title">Bot Results</div>
    <div class="summary-grid" id="bres-summary"></div>
  </div>
  <div class="card">
    <div class="card-title">Decisions</div>
    <div id="bres-review"></div>
  </div>
  <div class="card">
    <div class="card-title">Optimal</div>
    <div id="bres-opt"></div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn btn-pri" onclick="backStart()">Menu</button>
    <button class="btn btn-red" id="bres-again" onclick="runBot(botMode)" style="margin-left:6px">Play Again</button>
  </div>
</div>
</div>

<script>
const ORDER = ["hp","attack","defense","special-attack","special-defense","speed"];
const LBL = {"hp":"HP","attack":"Attack","defense":"Defense","special-attack":"Sp.Atk","special-defense":"Sp.Def","speed":"Speed"};
const COL = {"hp":"#ff5959","attack":"#f08030","defense":"#f5d743","special-attack":"#6890f0","special-defense":"#78c850","speed":"#f85888"};
const TYPECOL = {"normal":"#A8A878","fire":"#F08030","water":"#6890F0","electric":"#F8D030","grass":"#78C850","ice":"#98D8D8","fighting":"#C03028","poison":"#A040A0","ground":"#E0C068","flying":"#A890F0","psychic":"#F85888","bug":"#A8B820","rock":"#B8A038","ghost":"#705898","dragon":"#7038F8","dark":"#705848","steel":"#B8B8D0","fairy":"#EE99AC"};
const MODE_LBL = {"regular":"Regular","mega":"Mega","legendary":"Legendary","mythical":"Mythical"};
const MODE_CLS = {"regular":"badge-regular","mega":"badge-mega","legendary":"badge-legendary","mythical":"badge-mythical"};

let selMode = "regular";
let curTarget = 400;
let gameState = null;
let revData = null;

let botSpeed = 1200;
let botMode = "ai";
let botData = null;
let botTurn = 0;

function ft(n){return n.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase())}

function filterPool(mode){
  let p = POKEMON_DATA;
  if(mode==="mega") return p.filter(x=>x.mega);
  if(mode==="legendary") return p.filter(x=>x.legendary);
  if(mode==="mythical") return p.filter(x=>x.mythical);
  return p;
}

function bestPossible(list){
  let best=0,bestA=null;
  function permute(arr,pre){
    if(pre.length===6){
      let t=0,a=[];
      for(let i=0;i<6;i++){let s=ORDER[i],p=pre[i];t+=p.stats[s]||0;a.push([s,p.name,p.stats[s]||0])}
      if(t>best){best=t;bestA=a}
      return;
    }
    for(let i=0;i<arr.length;i++){
      let r=[...arr];r.splice(i,1);permute(r,[...pre,arr[i]]);
    }
  }
  permute(list,[]);
  return [best,bestA];
}

function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function typeBadges(name){
  let s=SPECIES_DATA[name];
  if(!s||!s.types) return '';
  return s.types.map(t=>'<span class="type-badge" style="background:'+(TYPECOL[t]||'#888')+'">'+t.toUpperCase()+'</span>').join('');
}

function spriteHtml(apiName, size, shiny){
  let id = SPRITE_DATA[apiName];
  if(!id) return '';
  let s = size || 80;
  let base = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/';
  let url = base + (shiny ? 'shiny/' : '') + id + '.png';
  return '<img class="poke-sprite'+(shiny?' shiny':'')+'" src="'+url+'" width="'+s+'" height="'+s+'" alt="">';
}

// ── Language model ──
const SW=new Set("the a an it its is are was were be been to of in for on with at by from as into through and or but not no this that these those their has have had can will may all each every both which who what when where how does do s t m ll re ve d o".split(" "));
function tok(t){return(t.toLowerCase().match(/[a-z]+/g)||[]).filter(w=>!SW.has(w)&&w.length>2)}

function features(pk){
  let f=new Set();
  tok(pk.name).forEach(w=>f.add("name:"+w));
  let s=SPECIES_DATA[pk.name];
  if(!s) return [...f];
  (s.flavor_texts||[]).forEach(t=>tok(t).forEach(w=>f.add("flavor:"+w)));
  (s.types||[]).forEach(t=>f.add("type:"+t));
  if(s.genus) tok(s.genus).forEach(w=>f.add("genus:"+w));
  if(s.color) f.add("color:"+s.color);
  if(s.shape) f.add("shape:"+s.shape);
  if(s.habitat) f.add("habitat:"+s.habitat);
  (s.egg_groups||[]).forEach(g=>f.add("egg:"+g));
  if(s.growth_rate) f.add("growth:"+s.growth_rate);
  if(s.generation) f.add("gen:"+s.generation);
  let cr=s.capture_rate||0;
  if(cr<=3) f.add("rarity:legendary_tier");
  else if(cr<=25) f.add("rarity:rare");
  else if(cr<=100) f.add("rarity:uncommon");
  else f.add("rarity:common");
  if(s.is_baby) f.add("stage:baby");
  let h=s.height||0;
  if(h<5) f.add("height:tiny");else if(h<10) f.add("height:small");else if(h<20) f.add("height:medium");else if(h<50) f.add("height:large");else f.add("height:huge");
  let w=s.weight||0;
  if(w<50) f.add("weight:light");else if(w<200) f.add("weight:medium");else if(w<500) f.add("weight:heavy");else f.add("weight:massive");
  if(pk.legendary) f.add("flag:legendary");
  if(pk.mythical) f.add("flag:mythical");
  if(pk.mega) f.add("flag:mega");
  return [...f];
}

class LearnBot{
  constructor(lr=0.3){this.lr=lr;this.w={};this.b=[0,0,0,0,0,0];this.picks=0}
  pred(f){
    let s=[...this.b],c=0;
    for(let x of f){
      let w=this.w[x]||[0,0,0,0,0,0];
      for(let i=0;i<6;i++)s[i]+=w[i];c++;
    }
    if(c>0)s=s.map(x=>x/c);
    let bi=s.indexOf(Math.max(...s));
    return [ORDER[bi],s[bi]];
  }
  upd(f,st){
    let bi=ORDER.indexOf(ORDER.reduce((a,b)=>st[a]>=st[b]?a:b));
    let pi=ORDER.indexOf(this.pred(f)[0]);
    for(let x of f){
      let w=this.w[x]||[0,0,0,0,0,0];
      for(let i=0;i<6;i++)w[i]+=this.lr*((i===bi?1:0)-(i===pi?1:0));
      this.w[x]=w;
    }
    this.b[bi]+=this.lr*0.1;this.b[pi]-=this.lr*0.1;this.picks++;
  }
}

let theBot=null;

function pretrainBot(){
  theBot=new LearnBot(0.3);
  let pool=filterPool("regular");
  for(let g=0;g<200;g++){
    let avail=[...Array(pool.length).keys()];shuf(avail);let ch=avail.slice(0,6);
    let locked=new Set();
    for(let i of ch){
      let pk=pool[i],fe=features(pk);
      if(!fe.length)fe=tok(pk.name).map(w=>"name:"+w);
      let st=theBot.pred(fe)[0],a=0;
      while(locked.has(st)&&a++<20){
        let sc=[];for(let s of ORDER)if(!locked.has(s))sc.push([theBot.pred([...fe,"STAT_HINT_"+s])[1],s]);
        sc.sort((a,b)=>b[0]-a[0]);st=sc.length?sc[0][1]:[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];
      }
      if(locked.has(st))st=[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];
      locked.add(st);theBot.upd(fe,pk.stats);
    }
  }
}

function botPick(pk,locked,mode){
  if(mode==="perfect"){
    let av=ORDER.filter(s=>!locked.has(s));
    if(!av.length)return [null,0];
    let best=av[0];for(let s of av)if((pk.stats[s]||0)>(pk.stats[best]||0))best=s;
    return [best,1];
  }
  let fe=features(pk);
  if(!fe.length)fe=tok(pk.name).map(w=>"name:"+w);
  let [st,conf]=theBot.pred(fe);let a=0;
  while(locked.has(st)&&a++<20){
    let sc=[];for(let s of ORDER)if(!locked.has(s))sc.push([theBot.pred([...fe,"STAT_HINT_"+s])[1],s]);
    sc.sort((a,b)=>b[0]-a[0]);st=sc.length?sc[0][1]:[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];conf=sc.length?sc[0][0]:0;
  }
  if(locked.has(st)){st=[...ORDER].filter(x=>!locked.has(x))[Math.random()*6|0];conf=0}
  return [st,conf];
}

// ── Game ──
const SHINY_ODDS = 512;

function newGame(mode,target){
  let pool=filterPool(mode);
  if(pool.length<6)return null;
  let idx=[...Array(pool.length).keys()];shuf(idx);idx=idx.slice(0,6);
  let shiny={};
  for(let i of idx){
    let pk=pool[i];
    let odds=pk.mythical||pk.legendary?10:pk.mega?64:SHINY_ODDS;
    if(Math.random()*odds<1) shiny[i]=true;
  }
  return {mode,target,pool,turn:0,picks:[],locked:new Set(),state:"play",used:idx,cur:idx[0],shown:[],shiny};
}

function getCurPoke(g){
  if(g.state!=="play")return null;
  if(g.cur===null&&g.turn<6){
    g.cur=g.used[g.turn];
  }
  if(g.turn>=6){g.state="done";return null}
  return g.pool[g.cur];
}

function doPick(g,stat){
  if(g.state!=="play")return null;
  if(g.locked.has(stat))return null;
  let pk=g.pool[g.cur];
  let val=pk.stats[stat]||0;
  let shiny=!!(g.shiny&&g.shiny[g.cur]);
  g.picks.push({name:pk.name,stat,val,api_name:pk.api_name,shiny});
  g.locked.add(stat);
  g.shown.push(pk);
  g._lastShiny=shiny;
  g.cur=null;
  g.turn++;
  if(g.turn>=6)g.state="done";
  let total=g.picks.reduce((s,p)=>s+p.val,0);
  return {turn:g.turn,total,state:g.state,revealed:{name:pk.name,stats:pk.stats,chosen:stat,value:val},locked:[...g.locked]};
}

function renderModeBtns(){
  let g=document.getElementById("mode-grid");
  g.innerHTML="";
  for(let [m,t] of Object.entries({"regular":filterPool("regular").length,"mega":filterPool("mega").length,"legendary":filterPool("legendary").length,"mythical":filterPool("mythical").length})){
    let b=document.createElement("div");
    b.className="mode-btn"+(m===selMode?" active":"");
    b.innerHTML="<strong>"+MODE_LBL[m]+"</strong><div class='count'>"+t+" Pokemon</div>";
    b.onclick=()=>{document.querySelectorAll(".mode-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");selMode=m;};
    g.appendChild(b);
  }
}

function showErr(m){let e=document.getElementById("err-msg");e.textContent=m;e.style.display="block";setTimeout(()=>e.style.display="none",3000)}

// ── Human game ──
document.getElementById("btn-play").onclick=async()=>{
  let t=parseInt(document.getElementById("target-inp").value)||400;curTarget=t;
  document.getElementById("btn-play").disabled=true;
  let g=newGame(selMode,t);
  if(!g){showErr("Not enough Pokemon");document.getElementById("btn-play").disabled=false;return}
  gameState=g;revData=null;
  showScreen("s-game");renderGame();
};

function renderGame(){
  let g=gameState;
  if(!g)return;
  document.getElementById("g-turn").textContent="Turn "+(Math.min(g.turn+1,6))+"/6";
  let tot=g.picks.reduce((s,p)=>s+p.val,0);
  document.getElementById("g-score").textContent="Score: "+tot;
  document.getElementById("g-prog").textContent=tot;
  document.getElementById("g-target").textContent=g.target;
  if(g.state==="done"){showRes(g);return}
  getCurPoke(g);
  renderPoke(g);
  renderHist(g);
}

function renderPoke(g){
  let el=document.getElementById("g-poke"),pk=g.cur!==null?g.pool[g.cur]:null;
  if(!pk&&revData)pk=g.shown[g.shown.length-1];
  if(!pk){el.innerHTML="";return}
  let cls=MODE_CLS[selMode]||"badge-regular",lb=MODE_LBL[selMode]||"Regular";
  let isRev=revData&&revData.name===pk.name;
  let shiny=g.cur!==null?!!(g.shiny&&g.shiny[g.cur]):!!(g._lastShiny);
  let h='<div class="poke-header">';
  h+='<div class="poke-sprite-wrap'+(shiny?' shiny':'')+'">'+spriteHtml(pk.api_name,80,shiny)+(shiny?'<span class="shiny-star">&#9733;</span>':'')+'</div>';
  h+='<div class="poke-name">'+pk.name+(shiny?' <span style="color:#ffd700;font-size:11px">&#9733;</span>':'')+'</div>';
  h+='<div style="margin-bottom:6px">'+typeBadges(pk.name)+'</div>';
  h+='<span class="poke-badge '+cls+'">'+lb+'</span></div>';
  for(let i=0;i<ORDER.length;i++){
    let s=ORDER[i];
    let lk=g.locked.has(s),rv=isRev,pi=rv&&revData.chosen===s;
    let cl="stat-row"+(lk?" locked":" clickable")+(rv?" reveal":"")+(pi?" picked":"");
    let v=rv?revData.stats[s]:"???",ba=rv?'<div class="stat-bar"><div class="stat-fill '+s+'" style="width:'+Math.min(100,revData.stats[s]/2.55)+'%"></div></div>':lk?'<div class="stat-bar"></div>':'<div class="stat-bar"><div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#445566">???</div></div>';
    let mk=lk?"LOCKED":rv?"":"PICK";
    let oc=lk||rv?"":'onclick="pickStat(\''+s+'\')"';
    let delay=rv?' style="animation-delay:'+(i*0.07)+'s"':'';
    h+='<div '+oc+' class="'+cl+'"'+delay+'><span class="stat-lbl">'+LBL[s]+'</span><span class="stat-val">'+v+'</span>'+ba+'<span class="stat-marker">'+mk+'</span></div>';
  }
  if(isRev)h+='<div style="text-align:center"><button class="btn-next" onclick="nextTurn()">NEXT</button></div>';
  el.innerHTML=h;
}

function renderHist(g){
  let el=document.getElementById("g-hist");
  if(!g.picks.length){el.innerHTML='<div style="color:#445566;font-size:15px">No picks</div>';return}
  el.innerHTML=g.picks.map(p=>'<div class="history-item">'+spriteHtml(p.api_name,28,p.shiny)+'<span>'+p.name+(p.shiny?' <span style="color:#ffd700;font-size:10px">&#9733;</span>':'')+' — '+LBL[p.stat]+'</span><strong>'+p.val+'</strong></div>').join("");
}

function pickStat(s){
  let r=doPick(gameState,s);if(!r)return;
  revData=r.revealed;
  let g=gameState;
  document.getElementById("g-score").textContent="Score: "+r.total;
  document.getElementById("g-prog").textContent=r.total;
  renderPoke(g);renderHist(g);
  if(g.state==="done")setTimeout(()=>showRes(g),500);
  else document.getElementById("btn-play").disabled=false;
}

function nextTurn(){revData=null;renderGame()}

function showRes(g){
  showScreen("s-res");
  let tot=g.picks.reduce((s,p)=>s+p.val,0),pas=tot>=g.target;
  let [best,ba]=bestPossible(g.shown);
  let phtml='<div class="summary-item"><div class="lbl">Score</div><div class="val" style="color:'+(pas?'#78c850':'#ff5959')+'">'+tot+'</div></div><div class="summary-item"><div class="lbl">Target</div><div class="val" style="color:#ffcb05">'+g.target+'</div></div><div class="summary-item"><div class="lbl">Best</div><div class="val" style="color:#6890f0">'+best+'</div></div><div class="summary-item"><div class="lbl">Result</div><div class="val" style="color:'+(pas?'#78c850':'#ff5959')+'">'+(pas?'PASS':'FAIL')+'</div></div>';
  document.getElementById("res-grid").innerHTML=phtml;
  document.getElementById("res-team").innerHTML=g.picks.map(p=>'<div class="history-item">'+spriteHtml(p.api_name,32,p.shiny)+'<span>'+p.name+(p.shiny?' <span style="color:#ffd700;font-size:10px">&#9733;</span>':'')+' — '+LBL[p.stat]+'</span><strong>'+p.val+'</strong></div>').join("");
  let o=document.getElementById("res-opt");
  if(ba){
    let apiMap={};g.shown.forEach(p=>{apiMap[p.name]={api:p.api_name,shiny:!!(g.shiny&&g.shiny[g.used[g.shown.indexOf(p)]])}});
    o.innerHTML='<table class="opt-table"><tr><th>Stat</th><th>Pokemon</th><th>Val</th></tr>'+ba.map(x=>{let m=apiMap[x[1]];return '<tr><td>'+LBL[x[0]]+'</td><td>'+(m?spriteHtml(m.api,24,m.shiny)+' ':'')+x[1]+(m&&m.shiny?' <span style="color:#ffd700">&#9733;</span>':'')+'</td><td><strong>'+x[2]+'</strong></td></tr>'}).join("")+'</table>';
  }else o.innerHTML='<div style="color:#445566;font-size:15px">No data</div>';
}

function playAgain(){
  document.getElementById("btn-play").disabled=false;
  document.getElementById("btn-play").click();
}

// ── Bot ──
document.getElementById("btn-ai").onclick=()=>runBot("ai");
document.getElementById("btn-poke").onclick=()=>runBot("perfect");

function runBot(mode){
  botMode=mode;
  let t=parseInt(document.getElementById("target-inp").value)||400;curTarget=t;
  let pool=filterPool(selMode);
  if(pool.length<6){showErr("Not enough Pokemon");return}
  let avail=[...Array(pool.length).keys()];shuf(avail);avail=avail.slice(0,6);
  let turns=[],locked=new Set(),total=0;
  let bShiny={};
  for(let i of avail){
    let pk=pool[i];
    let odds=pk.mythical||pk.legendary?10:pk.mega?64:SHINY_ODDS;
    if(Math.random()*odds<1) bShiny[i]=true;
  }
  for(let i of avail){
    let pk=pool[i];
    let isShiny=!!bShiny[i];
    let [st,conf]=botPick(pk,locked,mode);
    let val=pk.stats[st]||0,ab=ORDER.reduce((a,b)=>pk.stats[a]>=pk.stats[b]?a:b);
    total+=val;locked.add(st);
    let feats=[];
    if(mode==="ai"&&theBot){
      let fe=features(pk);if(!fe.length)fe=tok(pk.name).map(w=>"name:"+w);
      let fs=fe.filter(x=>theBot.w[x]).map(x=>[x,theBot.w[x][ORDER.indexOf(st)]]).sort((a,b)=>b[1]-a[1]).slice(0,5);
      feats=fs.map(x=>({feature:x[0],weight:x[1].toFixed(2)}));
      theBot.upd(fe,pk.stats);
    }else if(mode==="perfect"){
      let sorted=ORDER.map(s=>({s, v:pk.stats[s]||0})).sort((a,b)=>b.v-a.v).slice(0,3);
      feats=sorted.map(x=>({feature:LBL[x.s]+"="+x.v,weight:x.v}));
    }
    turns.push({pokemon:{name:pk.name,api_name:pk.api_name,shiny:isShiny,stats:Object.fromEntries(ORDER.map(s=>[LBL[s],pk.stats[s]||0]))},decision:{picked:LBL[st],actualBest:LBL[ab],value:val,bestVal:pk.stats[ab],confidence:conf},features:feats,locked:[...locked]});
  }
  let [best,ba]=bestPossible(avail.map(i=>pool[i]));
  let eff=best>0?Math.round(total/best*1000)/10:0;
  botData={mode:selMode,target:t,total,bestPossible:best,efficiency:eff,passed:total>=t,turns,optimal:ba?ba.map(x=>({stat:LBL[x[0]],name:x[1],val:x[2]})):[]};
  showScreen("s-bot");botTurn=0;
  document.getElementById("b-target").textContent=t;
  renderBotTurn();
}

function setSp(ms){botSpeed=ms;document.querySelectorAll(".btn-sm").forEach(b=>b.classList.remove("active"));document.querySelector('[data-sp="'+ms+'"]').classList.add("active")}

function renderBotTurn(){
  let tr=botData.turns[botTurn],t=botTurn,isAI=botMode==="ai";
  let tot=botData.turns.slice(0,t+1).reduce((s,x)=>s+x.decision.value,0);
  document.getElementById("b-turn").textContent="Turn "+(t+1)+"/6";
  document.getElementById("b-score").textContent="Score: "+tot;
  document.getElementById("b-prog").textContent=tot;
  let pk=tr.pokemon,bd=tr.decision;
  let isShiny=!!pk.shiny;
  let h='<div class="poke-header">';
  h+='<div class="poke-sprite-wrap'+(isShiny?' shiny':'')+'">'+spriteHtml(pk.api_name,80,isShiny)+(isShiny?'<span class="shiny-star">&#9733;</span>':'')+'</div>';
  h+='<div class="poke-name">'+pk.name+(isShiny?' <span style="color:#ffd700;font-size:11px">&#9733;</span>':'')+' <span class="poke-badge" style="background:'+(isAI?"#cc3333":"#3366cc")+';color:#fff;font-family:\'Press Start 2P\',monospace;font-size:7px">'+(isAI?"AI":"Poke")+'</span></div>';
  h+='<div style="margin-bottom:6px">'+typeBadges(pk.name)+'</div></div>';
  for(let sk of ORDER){
    let sl=LBL[sk],val=pk.stats[sl]||0,pi=sl===bd.picked,bi=sl===bd.actualBest;
    let cl="stat-row";
    if(pi)cl+=bi?" picked":" missed";
    else if(bi)cl+=" best-highlight";
    let pct=Math.min(100,val/2.55);
    let ba='<div class="stat-bar"><div class="stat-fill '+sk+'" style="width:'+pct+'%"></div></div>';
    let mk="";
    if(pi)mk=bi?"PICK":"MISS";
    else if(bi)mk="BEST";
    h+='<div class="'+cl+'"><span class="stat-lbl">'+sl+'</span><span class="stat-val">'+val+'</span>'+ba+'<span class="stat-marker">'+mk+'</span></div>';
  }
  let cor=bd.picked===bd.actualBest;
  h+='<div class="bot-dec'+(isAI?"":" perfect")+'" style="border-color:'+(isAI?"#cc3333":"#3366cc")+'">';
  if(isAI){
    let cnf=Math.min(100,Math.max(0,(bd.confidence+2)/4*100));
    h+='<div>Picked <strong>'+bd.picked+'</strong> ('+bd.value+') conf:'+bd.confidence.toFixed(2)+' — best: <strong>'+bd.actualBest+'</strong> ('+bd.bestVal+') <span style="color:'+(cor?"#78c850":"#ff4444")+'">'+(cor?"OK":"NO")+'</span></div>';
    h+='<div class="conf-bar"><div class="conf-fill" style="width:'+cnf+'%"></div></div>';
  }else{
    h+='<div>Picked <strong>'+bd.picked+'</strong> = '+bd.value+' — best: <strong>'+bd.actualBest+'</strong> = '+bd.bestVal+' <span style="color:'+(cor?"#78c850":"#ff4444")+'">'+(cor?"OK":"NO")+'</span></div>';
    h+='<div style="color:#667788;font-size:14px;margin-top:2px">Greedy pick — knows all stats</div>';
  }
  if(tr.features.length){
    h+='<div class="bot-feats">';
    for(let f of tr.features)h+='<span class="bot-feat"><strong>'+f.feature+'</strong>'+(isAI?" ("+f.weight+")":"")+'</span>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById("b-poke").innerHTML=h;
  let hh="";
  for(let i=0;i<=t;i++){let d=botData.turns[i];let p=d.pokemon;hh+='<div class="history-item">'+spriteHtml(p.api_name,28,p.shiny)+'<span>'+(i+1)+'. '+p.name+(p.shiny?' <span style="color:#ffd700;font-size:10px">&#9733;</span>':'')+' — '+d.decision.picked+'</span><strong>'+d.decision.value+' '+(d.decision.picked===d.decision.actualBest?"OK":"")+'</strong></div>'}
  document.getElementById("b-hist").innerHTML=hh;
  if(t+1<6){if(botSpeed>0)setTimeout(()=>{botTurn++;renderBotTurn()},botSpeed);else{botTurn++;renderBotTurn()}}
  else setTimeout(showBotRes,botSpeed);
}

function showBotRes(){
  let g=botData,isAI=botMode==="ai";
  let theme=isAI?{name:"AI Bot",color:"#cc3333"}:{name:"PokeBot",color:"#3366cc"};
  showScreen("s-bres");
  document.getElementById("bres-title").textContent=theme.name+(g.passed?" PASSED":" FAILED");
  document.getElementById("bres-again").textContent="Play Again";
  document.getElementById("bres-again").style.background=theme.color;
  document.getElementById("bres-summary").innerHTML='<div class="summary-item"><div class="lbl">Score</div><div class="val" style="color:'+(g.passed?"#78c850":"#ff4444")+'">'+g.total+'</div></div><div class="summary-item"><div class="lbl">Target</div><div class="val" style="color:#ffcb05">'+g.target+'</div></div><div class="summary-item"><div class="lbl">Efficiency</div><div class="val" style="color:#6890f0">'+g.efficiency+'%</div></div><div class="summary-item"><div class="lbl">Result</div><div class="val" style="color:'+(g.passed?"#78c850":"#ff4444")+'">'+(g.passed?"PASS":"FAIL")+'</div></div>';
  let h="";
  for(let i=0;i<g.turns.length;i++){let d=g.turns[i].decision,c=d.picked===d.actualBest;let p=g.turns[i].pokemon;h+='<div class="history-item">'+spriteHtml(p.api_name,32,p.shiny)+'<span>'+(i+1)+'. '+p.name+(p.shiny?' <span style="color:#ffd700;font-size:10px">&#9733;</span>':'')+'</span><span>'+d.picked+' ('+d.value+') <span style="color:'+(c?"#78c850":"#ff4444")+'">'+(c?"OK":"best: "+d.actualBest+"="+d.bestVal)+'</span></span></div>'}
  document.getElementById("bres-review").innerHTML=h;
  let o=document.getElementById("bres-opt");
  if(g.optimal.length){
    let apiMap={};g.turns.forEach(t=>{apiMap[t.pokemon.name]={api:t.pokemon.api_name,shiny:t.pokemon.shiny}});
    o.innerHTML='<table class="opt-table"><tr><th>Stat</th><th>Pokemon</th><th>Val</th></tr>'+g.optimal.map(x=>{let m=apiMap[x.name];return '<tr><td>'+x.stat+'</td><td>'+(m?spriteHtml(m.api,24,m.shiny)+' ':'')+x.name+(m&&m.shiny?' <span style="color:#ffd700">&#9733;</span>':'')+'</td><td><strong>'+x.val+'</strong></td></tr>'}).join("")+'</table>';
  }else o.innerHTML='<div style="color:#445566;font-size:15px">No data</div>';
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function backStart(){
  document.getElementById("btn-play").disabled=false;
  showScreen("s-start");
}

renderModeBtns();
pretrainBot();
console.log("Bot pre-trained, vocab:", Object.keys(theBot.w).length);
